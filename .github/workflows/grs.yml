name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card (Dark)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide=&count_private=true&title_color=0891b2&text_color=ffffff&icon_color=0891b2&bg_color=151515&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GH_PAT }}

      - name: Generate stats card (Light)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide=&count_private=true&title_color=0891b2&icon_color=0891b2
          path: profile/stats-light.svg
          token: ${{ secrets.GH_PAT }}

      - name: Generate top languages card (Dark)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&langs_count=10&title_color=0891b2&text_color=ffffff&icon_color=0891b2&bg_color=151515&hide_border=true&locale=en&layout=compact
          path: profile/top-langs.svg
          token: ${{ secrets.GH_PAT }}

      - name: Generate top languages card (Light)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&langs_count=10&title_color=0891b2&icon_color=0891b2&locale=en&layout=compac
          path: profile/top-langs-light.svg
          token: ${{ secrets.GH_PAT }}

      - name: Generate Wakatime card (Dark)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: wakatime
          options: username=alwyn974&layout=compact&langs_count=10&title_color=0891b2&text_color=ffffff&icon_color=0891b2&bg_color=151515&hide_border=true&locale=en
          path: profile/wakatime.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Wakatime card (Light)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: wakatime
          options: username=alwyn974&layout=compact&title_color=0891b2&icon_color=0891b2&locale=en
          path: profile/wakatime-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: Update README cards" || exit 0
          git push
